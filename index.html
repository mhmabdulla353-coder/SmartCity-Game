<!DOCTYPE html>
<html>
<head>
<title>SmartCity Puzzle Crisis Simulator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>SmartCity Puzzle Crisis Simulator</h1>

<div class="dashboard">

<h2>🏙 Smart City Dashboard</h2>

<p>👤 Player: <span id="playerNameDisplay"></span></p>

<p>🚨 Crisis Status: <span id="crisisStatus">No crisis started</span></p>

<p>⭐ Score: <span id="score">0</span></p>

<p>📊 Progress: <span id="progressText">0%</span></p>

<div class="progress-container">
<div id="progressBar"></div>
</div>

</div>

<h2>City Crisis</h2>

<button onclick="startCrisis('fire')">🔥 Fire</button>
<button onclick="startCrisis('flood')">🌊 Flood</button>
<button onclick="startCrisis('accident')">🚗 Accident</button>

<h2>Puzzle</h2>

<img id="puzzleImage" width="300">

<br><br>

<input type="text" id="answer" placeholder="Enter answer">
<button onclick="checkAnswer()">Submit</button>

<script src="script.js"></script>

</body>
</html>
