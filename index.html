<!DOCTYPE html>
<html>
<head>
    <title>SmartCity Puzzle Crisis Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🏙 SmartCity Puzzle Crisis Simulator</h1>

    <div class="dashboard">
        <h2>📊 Smart City Dashboard</h2>
        <p>👤 Player: <span id="playerNameDisplay"></span></p>
        <p>🔐 Session: <span style="color:#22c55e;">Active</span></p>
        <p>🚨 Crisis Status: <span id="crisisStatus">No crisis started</span></p>
        <p>⭐ Score: <span id="score">0</span></p>
        <p>⏱ Time Left: <span id="timerDisplay" style="font-weight:bold; color:#22c55e;">30s</span></p>
        <p>📈 Progress: <span id="progressText">0%</span></p>

        <div class="progress-container">
            <div id="progressBar"></div>
        </div>

        <br>
        <button onclick="window.location.href='leaderboard.html'" style="background-color:#6366f1;">🏆 Leaderboard</button>
        <button onclick="logout()" style="background-color:#ef4444;">🚪 Logout</button>
    </div>

    <h2>🌆 City Crisis</h2>
    <p style="color:#94a3b8;">Select a crisis to begin solving puzzles</p>

    <button onclick="startCrisis('fire')">🔥 Fire</button>
    <button onclick="startCrisis('flood')">🌊 Flood</button>
    <button onclick="startCrisis('accident')">🚗 Accident</button>

    <h2>🧩 Puzzle</h2>

    <p id="loadingText" style="color:#94a3b8;">Start a crisis to load a puzzle...</p>
    <img id="puzzleImage" width="300" style="display:none; border-radius:8px;">

    <br><br>

    <input type="text" id="answer" placeholder="Enter answer (0-9)" maxlength="1">
    <button onclick="checkAnswer()">✅ Submit Answer</button>

    <br><br>

    <p id="feedbackMsg" style="font-size:1.2em;"></p>

    <audio id="victorySound" src="victory.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
