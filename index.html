<!DOCTYPE html>
<html>

<head>
    <!-- Title of the web page shown in the browser tab -->
    <title>SmartCity Puzzle Crisis Simulator</title>

    <!-- Linking the external CSS file for styling -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main title of the application -->
    <h1>SmartCity Puzzle Crisis Simulator</h1>

    <!-- Smart City Dashboard section -->
    <div class="dashboard">

        <!-- Dashboard heading -->
        <h2>🏙 Smart City Dashboard</h2>

        <!-- Displays the player name (Virtual Identity) -->
        <p>👤 Player: <span id="playerNameDisplay"></span></p>

        <!-- Shows the current crisis status -->
        <p>🚨 Crisis Status: <span id="crisisStatus">No crisis started</span></p>

        <!-- Displays the player's score -->
        <p>⭐ Score: <span id="score">0</span></p>

        <!-- Displays the progress percentage -->
        <p>📊 Progress: <span id="progressText">0%</span></p>

        <!-- Progress bar container -->
        <div class="progress-container">
            <!-- Actual progress bar that increases as puzzles are solved -->
            <div id="progressBar"></div>
        </div>

    </div>

    <!-- Actual progress bar that increases as puzzles are solved -->
    <h2>City Crisis</h2>

    <!-- Section for selecting the type of city crisis -->
    <button onclick="startCrisis('fire')">🔥 Fire</button>
    <button onclick="startCrisis('flood')">🌊 Flood</button>
    <button onclick="startCrisis('accident')">🚗 Accident</button>

    <!-- Puzzle section -->
    <h2>Puzzle</h2>

    <!-- Image that displays the puzzle question from the API -->
    <img id="puzzleImage" width="300">

    <br><br>

    <!-- Image that displays the puzzle question from the API -->
    <input type="text" id="answer" placeholder="Enter answer">
    <!-- Button to submit the answer -->
    <button onclick="checkAnswer()">Submit</button>

    <!-- 🔊 Victory Sound -->
    <audio id="victorySound" src="victory.mp3"></audio>

    <!-- Button to submit the answer -->
    <script src="script.js"></script>

</body>

</html>
