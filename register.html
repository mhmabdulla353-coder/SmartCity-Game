<!DOCTYPE html>
<html>

<head>
    <title>SmartCity Register</title>
    <link rel="stylesheet" href="style.css">
    <style>

        /* Background gradient */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Twinkling stars */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.2; }
            to   { opacity: 1; }
        }

        /* City skyline at bottom */
        .skyline {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
        }

        /* Register card */
        .register-card {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 370px;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .logo { font-size: 3rem; margin-bottom: 0.3rem; }

        .register-card h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #38bdf8;
            margin: 0 0 0.2rem;
        }

        .register-card p.subtitle {
            font-size: 0.85rem;
            color: #94a3b8;
            margin: 0 0 1.5rem;
        }

        /* Input fields with icons */
        .input-wrap {
            position: relative;
            margin-bottom: 1rem;
            text-align: left;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
        }

        .input-wrap input {
            width: 100%;
            padding: 11px 12px 11px 38px;
            border-radius: 10px;
            border: 1.5px solid rgba(56, 189, 248, 0.3);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .input-wrap input:focus {
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.9);
        }

        .input-wrap input::placeholder { color: #475569; }

        /* Create account button */
        .btn-register {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #0ea5e9, #6366f1);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }
        .btn-register:hover { opacity: 0.88; }

        /* Divider line */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1.3rem 0 1rem;
        }
        .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
        .divider-text { font-size: 0.72rem; color: #475569; }

        /* Login link */
        .login-link { font-size: 0.88rem; color: #94a3b8; }
        .login-link a { color: #38bdf8; font-weight: 600; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }

        /* Error message - shown in red */
        #errorMsg {
            color: #ef4444;
            font-size: 0.82rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 1rem;
            display: none;
        }

        /* Success message - shown in green */
        #successMsg {
            color: #22c55e;
            font-size: 0.82rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 1rem;
            display: none;
        }

        /* Password match indicator */
        #matchMsg {
            font-size: 0.78rem;
            margin-top: 4px;
            margin-left: 4px;
            display: none;
            text-align: left;
        }

    </style>
</head>

<body>

    <!-- City skyline at the bottom -->
    <svg class="skyline" viewBox="0 0 800 120"
         xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <rect x="0"   y="60" width="30"  height="60"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="35"  y="40" width="40"  height="80"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="80"  y="50" width="25"  height="70"  fill="#162d4a" opacity="0.9"/>
        <rect x="110" y="25" width="50"  height="95"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="165" y="55" width="20"  height="65"  fill="#162d4a" opacity="0.9"/>
        <rect x="260" y="20" width="55"  height="100" fill="#1e3a5f" opacity="0.8"/>
        <rect x="278" y="10" width="8"   height="10"  fill="#38bdf8" opacity="0.5"/>
        <rect x="355" y="30" width="45"  height="90"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="510" y="20" width="50"  height="100" fill="#1e3a5f" opacity="0.8"/>
        <rect x="528" y="10" width="8"   height="10"  fill="#38bdf8" opacity="0.5"/>
        <rect x="665" y="25" width="55"  height="95"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="760" y="40" width="40"  height="80"  fill="#1e3a5f" opacity="0.8"/>
        <!-- Glowing windows -->
        <rect x="40"  y="65" width="4" height="4" fill="#fbbf24" opacity="0.7"/>
        <rect x="120" y="55" width="4" height="4" fill="#fbbf24" opacity="0.7"/>
        <rect x="270" y="45" width="4" height="4" fill="#fbbf24" opacity="0.7"/>
        <rect x="515" y="45" width="4" height="4" fill="#fbbf24" opacity="0.7"/>
        <rect x="670" y="50" width="4" height="4" fill="#fbbf24" opacity="0.7"/>
    </svg>

    <!-- Register Card -->
    <div class="register-card">

        <div class="logo">🏙</div>
        <h1>Create Account</h1>
        <p class="subtitle">Join SmartCity and save the city!</p>

        <!-- Success message (hidden until account created) -->
        <p id="successMsg"></p>

        <!-- Error message (hidden until error happens) -->
        <p id="errorMsg"></p>

        <!-- Username input -->
        <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="regUsername" placeholder="Enter your username" />
        </div>

        <!-- Password input -->
        <div class="input-wrap">
            <span class="input-icon">🔐</span>
            <input type="password" id="regPassword" placeholder="Create a password" />
        </div>

        <!-- Confirm password input -->
        <!-- oninput fires every time user types - event driven! -->
        <div class="input-wrap">
            <span class="input-icon">🔁</span>
            <input type="password" id="regConfirm"
                   placeholder="Confirm your password"
                   oninput="checkPasswordMatch()" />
            <!-- Shows if passwords match or not -->
            <p id="matchMsg"></p>
        </div>

        <!-- Create account button -->
        <button class="btn-register" onclick="register()">
            ✅ Create Account
        </button>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">already have an account?</div>
            <div class="divider-line"></div>
        </div>

        <!-- Link back to login page -->
        <div class="login-link">
            Already registered? <a href="login.html">Login here →</a>
        </div>

    </div>

    <script>

        // ── THEME: VIRTUAL IDENTITY ──────────────────────────────────────
        // Registration saves new player accounts to localStorage
        // Each account: { username, password (base64 encoded), date }
        // Reference: MDN - localStorage
        // https://developer.mozilla.org/en-US/docs/Web/API/Window/localStorage

        // Generate twinkling stars in background
        for (let i = 0; i < 40; i++) {
            let star = document.createElement("div");
            star.className = "star";
            star.style.width             = (Math.random() * 2 + 1) + "px";
            star.style.height            = star.style.width;
            star.style.top               = (Math.random() * 60) + "%";
            star.style.left              = (Math.random() * 100) + "%";
            star.style.animationDuration = (Math.random() * 2 + 1.5) + "s";
            star.style.animationDelay    = (Math.random() * 2) + "s";
            document.body.appendChild(star);
        }

        // If already logged in skip to leaderboard
        if (localStorage.getItem("authenticated") === "true") {
            window.location.href = "leaderboard.html";
        }

        // ── Password match checker ────────────────────────────────────────
        // THEME: EVENT-DRIVEN - fires every time user types in confirm field
        function checkPasswordMatch() {
            let password = document.getElementById("regPassword").value;
            let confirm  = document.getElementById("regConfirm").value;
            let matchMsg = document.getElementById("matchMsg");

            // Don't show anything if confirm is empty
            if (confirm === "") {
                matchMsg.style.display = "none";
                return;
            }

            matchMsg.style.display = "block";

            if (password === confirm) {
                matchMsg.innerText   = "✅ Passwords match!";
                matchMsg.style.color = "#22c55e"; // green
            } else {
                matchMsg.innerText   = "❌ Passwords do not match!";
                matchMsg.style.color = "#ef4444"; // red
            }
        }

        // ── Show error message ────────────────────────────────────────────
        function showError(msg) {
            document.getElementById("errorMsg").innerText     = "❌ " + msg;
            document.getElementById("errorMsg").style.display = "block";
            document.getElementById("successMsg").style.display = "none";
        }

        // ── Show success message ──────────────────────────────────────────
        function showSuccess(msg) {
            document.getElementById("successMsg").innerText     = "✅ " + msg;
            document.getElementById("successMsg").style.display = "block";
            document.getElementById("errorMsg").style.display   = "none";
        }

        // ── Register function ─────────────────────────────────────────────
        // Triggered by button click or Enter key
        function register() {

            // Get values from input fields
            let username = document.getElementById("regUsername").value.trim();
            let password = document.getElementById("regPassword").value.trim();
            let confirm  = document.getElementById("regConfirm").value.trim();

            // Check 1: All fields must be filled
            if (username === "" || password === "" || confirm === "") {
                showError("Please fill in all fields!");
                return;
            }

            // Check 2: Username must be at least 3 characters
            if (username.length < 3) {
                showError("Username must be at least 3 characters!");
                return;
            }

            // Check 3: Password must be at least 4 characters
            if (password.length < 4) {
                showError("Password must be at least 4 characters!");
                return;
            }

            // Check 4: Both passwords must match
            if (password !== confirm) {
                showError("Passwords do not match!");
                return;
            }

            // Check 5: Username must not already exist
            let users = JSON.parse(localStorage.getItem("users") || "[]");

            let userExists = users.find(function(u) {
                return u.username.toLowerCase() === username.toLowerCase();
            });

            if (userExists) {
                showError("Username already taken! Choose another.");
                return;
            }

            // All checks passed - save new account!
            // Password is encoded using base64 for basic security
            // Reference: MDN - btoa()
            // https://developer.mozilla.org/en-US/docs/Web/API/btoa
            users.push({
                username: username,
                password: btoa(password),
                date:     new Date().toLocaleDateString()
            });

            localStorage.setItem("users", JSON.stringify(users));

            // Show success message
            showSuccess("Account created! Redirecting to login...");

            // THEME: EVENT-DRIVEN - setTimeout fires after 2 seconds
            setTimeout(function() {
                window.location.href = "login.html";
            }, 2000);
        }

        // THEME: EVENT-DRIVEN - Enter key triggers register
        document.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                register();
            }
        });

    </script>

</body>
</html>
