<!DOCTYPE html>
<html>
<head>
    <title>SmartCity Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.2; }
            to   { opacity: 1; }
        }
        .skyline {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            position: relative;
            z-index: 10;
            text-align: center;
        }
        .logo { font-size: 3rem; margin-bottom: 0.3rem; }
        .login-card h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #38bdf8;
            margin: 0 0 0.2rem;
        }
        .login-card p.subtitle {
            font-size: 0.85rem;
            color: #94a3b8;
            margin: 0 0 1.8rem;
        }
        .input-wrap {
            position: relative;
            margin-bottom: 1.1rem;
            text-align: left;
        }
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
        }
        .input-wrap input {
            width: 100%;
            padding: 11px 12px 11px 38px;
            border-radius: 10px;
            border: 1.5px solid rgba(56, 189, 248, 0.3);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .input-wrap input:focus {
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.9);
        }
        .input-wrap input::placeholder { color: #475569; }
        .btn-start {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #0ea5e9, #6366f1);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }
        .btn-start:hover { opacity: 0.88; }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1.3rem 0;
        }
        .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
        .divider-text { font-size: 0.72rem; color: #475569; }
        .badges { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid;
        }
        .badge-blue   { color: #38bdf8; border-color: rgba(56,189,248,0.35);  background: rgba(56,189,248,0.08); }
        .badge-green  { color: #22c55e; border-color: rgba(34,197,94,0.35);   background: rgba(34,197,94,0.08); }
        .badge-purple { color: #a78bfa; border-color: rgba(167,139,250,0.35); background: rgba(167,139,250,0.08); }
        #errorMsg {
            color: #ef4444;
            font-size: 0.85rem;
            margin: 0.5rem 0 0;
            display: none;
        }
    </style>
</head>
<body>

    <svg class="skyline" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <rect x="0"   y="60" width="30"  height="60"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="35"  y="40" width="40"  height="80"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="80"  y="50" width="25"  height="70"  fill="#162d4a" opacity="0.9"/>
        <rect x="110" y="25" width="50"  height="95"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="165" y="55" width="20"  height="65"  fill="#162d4a" opacity="0.9"/>
        <rect x="190" y="35" width="35"  height="85"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="260" y="20" width="55"  height="100" fill="#1e3a5f" opacity="0.8"/>
        <rect x="278" y="10" width="8"   height="10"  fill="#38bdf8" opacity="0.5"/>
        <rect x="355" y="30" width="45"  height="90"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="430" y="35" width="40"  height="85"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="510" y="20" width="50"  height="100" fill="#1e3a5f" opacity="0.8"/>
        <rect x="528" y="10" width="8"   height="10"  fill="#38bdf8" opacity="0.5"/>
        <rect x="595" y="30" width="40"  height="90"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="665" y="25" width="55"  height="95"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="760" y="40" width="40"  height="80"  fill="#1e3a5f" opacity="0.8"/>
        <rect x="120" y="55" width="4" height="4" fill="#fbbf24" opacity="0.7"/>
        <rect x="270" y="45" width="4" height="4" fill="#fbbf24" opacity="0.7"/>
        <rect x="360" y="55" width="4" height="4" fill="#38bdf8" opacity="0.6"/>
        <rect x="440" y="58" width="4" height="4" fill="#fbbf24" opacity="0.7"/>
        <rect x="515" y="45" width="4" height="4" fill="#fbbf24" opacity="0.7"/>
        <rect x="670" y="50" width="4" height="4" fill="#fbbf24" opacity="0.7"/>
    </svg>

    <div class="login-card">
        <div class="logo">🏙</div>
        <h1>SmartCity Login</h1>
        <p class="subtitle">Sign in to manage your city</p>

        <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="playerName" placeholder="Enter your name" />
        </div>

        <div class="input-wrap">
            <span class="input-icon">🔐</span>
            <input type="password" id="playerPassword" placeholder="Enter password" />
        </div>

        <p id="errorMsg">❌ Name and password are required!</p>

        <button class="btn-start" onclick="login()">▶ Start Game</button>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">secured session</div>
            <div class="divider-line"></div>
        </div>

        <div class="badges">
            <span class="badge badge-blue">🌐 API</span>
            <span class="badge badge-green">🔒 Cookie Auth</span>
            <span class="badge badge-purple">⚡ Events</span>
        </div>
    </div>

    <script>
        // ── THEME: VIRTUAL IDENTITY ──────────────────────────────────────
        // Using localStorage and sessionStorage for player authentication
        // Reference: MDN Web Docs - Web Storage API
        // https://developer.mozilla.org/en-US/docs/Web/API/Web_Storage_API

        // Generate twinkling stars
        for (let i = 0; i < 40; i++) {
            let star = document.createElement("div");
            star.className = "star";
            star.style.width  = (Math.random() * 2 + 1) + "px";
            star.style.height = star.style.width;
            star.style.top    = (Math.random() * 60) + "%";
            star.style.left   = (Math.random() * 100) + "%";
            star.style.animationDuration = (Math.random() * 2 + 1.5) + "s";
            star.style.animationDelay    = (Math.random() * 2) + "s";
            document.body.appendChild(star);
        }

        // If already logged in, go straight to leaderboard
        if (localStorage.getItem("authenticated") === "true") {
            window.location.href = "leaderboard.html";
        }

        function login() {
            let name     = document.getElementById("playerName").value.trim();
            let password = document.getElementById("playerPassword").value.trim();

            if (name === "" || password === "") {
                document.getElementById("errorMsg").style.display = "block";
                return;
            }

            document.getElementById("errorMsg").style.display = "none";

            // Store virtual identity
            localStorage.setItem("playerName", name);
            localStorage.setItem("authenticated", "true");
            sessionStorage.setItem("playerPassword", btoa(password));

            // ✅ Redirect to leaderboard after login
            window.location.href = "leaderboard.html";
        }

        // ── THEME: EVENT-DRIVEN PROGRAMMING ─────────────────────────────
        // Enter key event triggers login
        document.addEventListener("keydown", function(event) {
            if (event.key === "Enter") { login(); }
        });
    </script>
</body>
</html>
